name: grist

services:
  grist:
    image: gristlabs/grist:${TAG:-latest}
    ports:
      - "${PORT:-8485}:8484"
    environment:
      APP_HOME_URL: ${APP_HOME_URL}
      GRIST_SESSION_SECRET: ${GRIST_SESSION_SECRET}
    volumes:
      - grist-data:/persist
    restart: always

volumes:
  grist-data:
